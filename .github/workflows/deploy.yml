name: Deploy Astro site to GitHub Pages

# On push to main this builds the Astro site and publishes dist/ to GitHub
# Pages. The configure-pages step below attempts to switch the Pages source to
# "GitHub Actions" automatically; if your org blocks that, set it once by hand
# under Settings → Pages → Build and deployment → Source → GitHub Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Configure Pages (enable GitHub Actions as the source)
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Install dependencies
        run: npm ci
      - name: Build with Astro
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
